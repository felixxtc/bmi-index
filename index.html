<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Жиромер</title>
    <meta name="description" content="Считай свой ИМТ по-русски">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="zyzz-container zyzz-right">
        <img src="zyzz.png" alt="Zyzz" class="zyzz-img">
    </div>

    <div class="zyzz-container zyzz-left">
        <img src="zyzz.png" alt="Zyzz" class="zyzz-img">
    </div>

    <main class="container">
        <header>
            <h1>Жиро<span>мер</span></h1>
            <p>Узнай свой ИМТ, братан 💪</p>
        </header>

        <section class="calculator-card glass-panel">
            <form id="bmi-form">
                <div class="input-group">
                    <label for="weight">Вес (кг)</label>
                    <input type="number" id="weight" step="0.1" placeholder="напр. 70" required>
                </div>
                <div class="input-group">
                    <label for="height">Рост (см)</label>
                    <input type="number" id="height" step="0.1" placeholder="напр. 175" required>
                </div>
                <button type="submit" class="primary-btn">Посчитать ИМТ</button>
            </form>

            <div id="result-display" class="result-display hidden">
                <div class="bmi-value" id="bmi-value">--</div>
                <div class="bmi-status" id="bmi-status">Введи данные</div>
            </div>
        </section>

        <section class="history-section glass-panel">
            <div class="history-header">
                <h2>История</h2>
                <button id="clear-history" class="text-btn">Очистить</button>
            </div>
            <ul id="history-list" class="history-list"></ul>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
